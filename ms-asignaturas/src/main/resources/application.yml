server:
  port: 8085

spring:
  application:
    name: ms-asignaturas
  datasource:
    url: jdbc:mysql://localhost:3306/db_asignaturas?createDatabaseIfNotExist=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/